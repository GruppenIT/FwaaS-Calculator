<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CAUSA</title>
  <style>
    /* Fontes locais — Inter e Lora (ttf ou woff2 no bundle) */
    @font-face {
      font-family: 'Lora';
      font-weight: 400;
      font-style: normal;
      font-display: swap;
      src: url('fonts/Lora-Regular.woff2') format('woff2'),
           url('fonts/Lora-Regular.ttf') format('truetype');
    }

    @font-face {
      font-family: 'Inter';
      font-weight: 400;
      font-style: normal;
      font-display: swap;
      src: url('fonts/Inter-Regular.woff2') format('woff2'),
           url('fonts/Inter-Regular.ttf') format('truetype');
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      width: 100vw;
      height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background-color: #0F1829;
      overflow: hidden;
      -webkit-app-region: drag;
      user-select: none;
      position: relative;
    }

    /* Imagem de fundo */
    .splash-bg {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background-image: url('CAUSA_splash_bg.png');
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
      z-index: 0;
    }

    /* Container principal */
    .content {
      position: relative;
      z-index: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      width: 100%;
      height: 100%;
    }

    /* Nome CAUSA */
    .brand-name {
      position: absolute;
      top: 45%;
      left: 50%;
      transform: translate(-50%, -50%);
      text-align: center;
    }

    .brand-name h1 {
      font-family: 'Lora', 'Georgia', 'Times New Roman', serif;
      font-weight: 600;
      font-size: 48px;
      letter-spacing: 0.15em;
      color: #FFFFFF;
      margin: 0;
      animation: fadeIn 0.8s ease-out forwards;
      opacity: 0;
    }

    .brand-name .tagline {
      margin-top: 12px;
      font-family: 'Inter', 'Segoe UI', system-ui, -apple-system, sans-serif;
      font-weight: 400;
      font-size: 15px;
      color: rgba(255, 255, 255, 0.65);
      animation: fadeIn 0.8s ease-out 0.3s forwards;
      opacity: 0;
    }

    /* Barra de progresso */
    .progress-area {
      position: absolute;
      bottom: 48px;
      left: 50%;
      transform: translateX(-50%);
      width: 320px;
      text-align: center;
      animation: fadeIn 0.8s ease-out 0.5s forwards;
      opacity: 0;
    }

    .status-text {
      font-family: 'Inter', 'Segoe UI', system-ui, -apple-system, sans-serif;
      font-weight: 400;
      font-size: 12px;
      color: rgba(255, 255, 255, 0.50);
      margin-bottom: 8px;
    }

    .progress-track {
      width: 100%;
      height: 2px;
      background: rgba(255, 255, 255, 0.15);
      border-radius: 2px;
      overflow: hidden;
    }

    .progress-bar {
      width: 0%;
      height: 100%;
      background: #2563A8;
      border-radius: 2px;
      transition: width 0.4s ease-out;
    }

    /* Versão */
    .version {
      position: absolute;
      bottom: 16px;
      right: 16px;
      font-family: 'Inter', 'Segoe UI', system-ui, -apple-system, sans-serif;
      font-weight: 400;
      font-size: 11px;
      color: rgba(255, 255, 255, 0.35);
      z-index: 1;
      animation: fadeIn 0.8s ease-out 0.5s forwards;
      opacity: 0;
    }

    /* Animações */
    @keyframes fadeIn {
      to { opacity: 1; }
    }

    /* Fade out ao fechar */
    body.fade-out {
      animation: fadeOut 200ms ease-out forwards;
    }

    @keyframes fadeOut {
      to { opacity: 0; }
    }
  </style>
</head>
<body>
  <div class="splash-bg"></div>

  <div class="content">
    <div class="brand-name">
      <h1>CAUSA</h1>
      <p class="tagline">A sua causa, no seu escritório.</p>
    </div>

    <div class="progress-area">
      <p class="status-text" id="status">Iniciando...</p>
      <div class="progress-track">
        <div class="progress-bar" id="progress-bar"></div>
      </div>
    </div>

    <span class="version" id="version">v0.1.0</span>
  </div>

  <script>
    // Progresso simulado com etapas reais via IPC
    const bar = document.getElementById('progress-bar');
    const status = document.getElementById('status');

    // Progresso inicial automático (simula carregamento enquanto aguarda IPC)
    let currentProgress = 0;

    function setProgress(percent, text) {
      currentProgress = percent;
      bar.style.width = percent + '%';
      if (text) status.textContent = text;
    }

    // Progresso gradual automático caso não receba IPC
    const steps = [
      { at: 300,  pct: 10, text: 'Iniciando...' },
      { at: 800,  pct: 25, text: 'Carregando módulos...' },
      { at: 1500, pct: 40, text: 'Conectando ao banco de dados...' },
      { at: 2200, pct: 60, text: 'Preparando interface...' },
      { at: 2800, pct: 80, text: 'Quase pronto...' },
    ];

    steps.forEach(step => {
      setTimeout(() => {
        // Só avança se o progresso IPC não tiver ultrapassado
        if (currentProgress < step.pct) {
          setProgress(step.pct, step.text);
        }
      }, step.at);
    });

    // Listener para progresso real via IPC (se preload expuser)
    if (window.electronAPI && window.electronAPI.onSplashProgress) {
      window.electronAPI.onSplashProgress((data) => {
        setProgress(data.percent, data.text);
      });
    }

    // Listener para fade out antes de fechar
    if (window.electronAPI && window.electronAPI.onSplashClose) {
      window.electronAPI.onSplashClose(() => {
        document.body.classList.add('fade-out');
      });
    }
  </script>
</body>
</html>
