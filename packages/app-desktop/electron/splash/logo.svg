<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6366f1;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#8b5cf6;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#6366f1" flood-opacity="0.3"/>
    </filter>
  </defs>
  <!-- Background circle -->
  <circle cx="100" cy="100" r="90" fill="url(#grad)" filter="url(#shadow)"/>
  <!-- Scale of justice icon -->
  <g transform="translate(100,100)" stroke="white" stroke-width="4" stroke-linecap="round" fill="none">
    <!-- Pillar -->
    <line x1="0" y1="-45" x2="0" y2="45"/>
    <!-- Base -->
    <line x1="-25" y1="45" x2="25" y2="45"/>
    <!-- Top bar -->
    <line x1="-40" y1="-45" x2="40" y2="-45"/>
    <!-- Left pan -->
    <line x1="-40" y1="-45" x2="-40" y2="-15"/>
    <path d="M-55,-15 A15,8 0 0,0 -25,-15" stroke="white" stroke-width="3.5"/>
    <!-- Right pan -->
    <line x1="40" y1="-45" x2="40" y2="-15"/>
    <path d="M25,-15 A15,8 0 0,0 55,-15" stroke="white" stroke-width="3.5"/>
    <!-- Top diamond -->
    <polygon points="0,-55 8,-45 0,-35 -8,-45" fill="white" stroke="none"/>
  </g>
</svg>
