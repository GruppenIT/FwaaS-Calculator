appId: "br.com.causa.erp"
productName: "CAUSA"
copyright: "Copyright © 2026 CAUSA SISTEMAS LTDA. Todos os direitos reservados."

directories:
  output: "../../dist-installer"
  buildResources: "resources"
  app: "../app-desktop"

files:
  - "dist/**/*"
  - "electron/**/*.js"
  - "electron/**/*.ico"
  - "electron/**/*.png"
  - "electron/splash/**/*"
  - "package.json"

asar: false

extraResources:
  - from: ".gh-token"
    to: ".gh-token"
    filter:
      - "**/*"

publish:
  provider: github
  owner: GruppenIT
  repo: FwaaS-Calculator
  private: true
  releaseType: release

win:
  target:
    - target: nsis
      arch:
        - x64
  icon: "resources/CAUSA_icon.ico"
  artifactName: "CAUSA-Setup-${version}.${ext}"
  publisherName: "CAUSA SISTEMAS LTDA"
  legalTrademarks: "© 2026 CAUSA SISTEMAS LTDA. Todos os direitos reservados."

nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
  installerIcon: "resources/CAUSA_icon.ico"
  uninstallerIcon: "resources/CAUSA_icon.ico"
  installerHeaderIcon: "resources/CAUSA_icon.ico"
  license: "resources/license.txt"
  include: "nsis/installer.nsh"
  artifactName: "CAUSA-Setup-${version}.${ext}"
  shortcutName: "CAUSA - A sua causa, no seu escritório"
  menuCategory: "CAUSA SISTEMAS"
  uninstallDisplayName: "CAUSA - A sua causa, no seu escritório"
  perMachine: true
  installerSidebar: null
  unicode: true
