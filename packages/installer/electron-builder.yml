appId: "br.com.causa.erp"
productName: "CAUSA"
copyright: "Copyright © 2026 CAUSA"

directories:
  output: "../../dist-installer"
  buildResources: "resources"
  app: "../app-desktop"

files:
  - "dist/**/*"
  - "electron/**/*.js"
  - "electron/splash/**/*"
  - "package.json"

asar: false

publish:
  provider: github
  owner: GruppenIT
  repo: FwaaS-Calculator

win:
  target:
    - target: nsis
      arch:
        - x64
  icon: "resources/Causa-icone.ico"
  artifactName: "CAUSA-Setup-${version}.${ext}"

nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
  installerIcon: "resources/Causa-icone.ico"
  uninstallerIcon: "resources/Causa-icone.ico"
  installerHeaderIcon: "resources/Causa-icone.ico"
  license: "resources/license.txt"
  include: "nsis/installer.nsh"
  artifactName: "CAUSA-Setup-${version}.${ext}"
  shortcutName: "CAUSA - A sua causa, no seu escritório"
  menuCategory: "CAUSA"
  uninstallDisplayName: "CAUSA - A sua causa, no seu escritório"
  perMachine: true
