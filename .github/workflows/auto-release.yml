name: Auto Release

on:
  push:
    branches:
      - "claude/fix-auto-update-install-wIFg3"

permissions:
  contents: write

jobs:
  merge-tag-and-release:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Fetch all tags
        run: git fetch --tags --force

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Merge into main
        shell: bash
        run: |
          git fetch origin main
          git checkout main
          git merge origin/claude/fix-auto-update-install-wIFg3 --no-edit
          git push origin main

      - name: Calculate next version
        id: version
        shell: bash
        run: |
          # List all version tags for debugging
          echo "All version tags:"
          git tag --list 'v*' --sort=-version:refname | head -n5

          # Get the latest version tag (e.g. v1.4.4)
          LATEST_TAG=$(git tag --list 'v*' --sort=-version:refname | head -n1)

          if [ -z "$LATEST_TAG" ]; then
            NEXT_VERSION="v1.0.0"
          else
            VERSION="${LATEST_TAG#v}"

            MAJOR=$(echo "$VERSION" | cut -d. -f1)
            MINOR=$(echo "$VERSION" | cut -d. -f2)
            PATCH=$(echo "$VERSION" | cut -d. -f3)

            echo "Current: major=$MAJOR minor=$MINOR patch=$PATCH"

            # Increment: after x.y.10 → x.(y+1).0
            if [ "$PATCH" -ge 10 ]; then
              MINOR=$((MINOR + 1))
              PATCH=0
              # After x.10.0 → (x+1).0.0
              if [ "$MINOR" -gt 10 ]; then
                MAJOR=$((MAJOR + 1))
                MINOR=0
              fi
            else
              PATCH=$((PATCH + 1))
            fi

            NEXT_VERSION="v${MAJOR}.${MINOR}.${PATCH}"
          fi

          echo "Latest tag: ${LATEST_TAG:-none}"
          echo "Next version: $NEXT_VERSION"
          echo "next_version=$NEXT_VERSION" >> "$GITHUB_OUTPUT"
          echo "version_number=${NEXT_VERSION#v}" >> "$GITHUB_OUTPUT"

      - name: Create and push tag
        shell: bash
        run: |
          git tag "${{ steps.version.outputs.next_version }}" main
          git push origin "${{ steps.version.outputs.next_version }}"

      # ── Build release (same steps as release.yml) ──

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Set version in package.json
        shell: bash
        run: |
          VERSION="${{ steps.version.outputs.version_number }}"
          echo "Setting version to $VERSION"
          node -e "
            const fs = require('fs');
            const pkg = JSON.parse(fs.readFileSync('packages/app-desktop/package.json','utf8'));
            pkg.version = '$VERSION';
            fs.writeFileSync('packages/app-desktop/package.json', JSON.stringify(pkg, null, 2) + '\n');
          "

      - name: Build packages
        run: |
          pnpm --filter @causa/shared run build
          pnpm --filter @causa/database run build
          pnpm --filter @causa/connectors run build
          pnpm --filter @causa/app-desktop run build

      - name: Build installer and publish to GitHub Release
        working-directory: packages/installer
        run: npx electron-builder --win --config electron-builder.yml --publish always
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: causa-installer
          path: dist-installer/*.exe
