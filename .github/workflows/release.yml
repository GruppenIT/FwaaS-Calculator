name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Set version from tag
        shell: bash
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          echo "Setting version to $VERSION"
          node -e "
            const fs = require('fs');
            const pkg = JSON.parse(fs.readFileSync('packages/app-desktop/package.json','utf8'));
            pkg.version = '$VERSION';
            fs.writeFileSync('packages/app-desktop/package.json', JSON.stringify(pkg, null, 2) + '\n');
          "

      - name: Build packages
        run: |
          pnpm --filter @causa/shared run build
          pnpm --filter @causa/database run build
          pnpm --filter @causa/app-desktop run build

      - name: Build installer
        working-directory: packages/installer
        run: npx electron-builder --win --config electron-builder.yml --publish never
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: causa-installer
          path: dist-installer/*.exe

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist-installer/*.exe
          generate_release_notes: true
          draft: false
          prerelease: ${{ contains(github.ref, '-beta') || contains(github.ref, '-alpha') || contains(github.ref, '-rc') }}
